spring:
  mongodb:
    username: mongodb
    password: mongodb
    host: 192.168.0.192
    authentication-database: admin
    database: mydata
    port: 27017
  data:
    mongodb:
      # 连接池配置
      connection-pool:
        max-size: 50          # 最大连接数
        min-size: 10          # 最小连接数
        max-wait-queue-size: 500  # 最大等待队列大小
        max-wait-time: 2000ms     # 最大等待时间
        max-idle-time: 60000ms    # 最大空闲时间
        max-life-time: 1800000ms  # 连接最大生命周期